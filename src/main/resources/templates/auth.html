<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BudgetTracker — Login / Sign Up</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-bg-grid"></div>
  <div class="auth-box">

    <!-- Logo -->
    <div class="auth-logo">
      <span class="auth-logo-icon">💰</span>
      <div class="auth-logo-title">Budget<span>Tracker</span></div>
      <div class="auth-logo-sub">₹ PERSONAL FINANCE MANAGER · 100% JAVA</div>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <!-- Tab switcher -->
      <div class="auth-tabs">
        <button class="auth-tab" th:classappend="${page == 'login'} ? 'active'"
                onclick="location.href='/login'">🔑 Login</button>
        <button class="auth-tab" th:classappend="${page == 'signup'} ? 'active'"
                onclick="location.href='/signup'">✨ Sign Up</button>
      </div>

      <!-- Error alert -->
      <div th:if="${error}" class="alert alert-danger">⚠ <span th:text="${error}"></span></div>

      <!-- ── LOGIN FORM ── -->
      <div th:if="${page == 'login'}">
        <p class="auth-sub">Welcome back! Sign in to your account.</p>
        <form method="post" action="/login">
          <div class="form-group">
            <label class="form-label">EMAIL ADDRESS</label>
            <input class="form-control" type="email" name="email" placeholder="you@example.com" required/>
          </div>
          <div class="form-group">
            <label class="form-label">PASSWORD</label>
            <div class="input-group">
              <input class="form-control" type="password" name="password" id="pw-login" placeholder="Enter password" required/>
              <button type="button" class="input-group-btn" onclick="togglePw('pw-login',this)">👁️</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;padding:13px;font-size:14px;margin-top:6px;">
            🔑 Sign In to Dashboard
          </button>
        </form>
        <div class="auth-switch">Don't have an account? <a href="/signup">Sign Up Free →</a></div>
      </div>

      <!-- ── SIGN UP FORM ── -->
      <div th:if="${page == 'signup'}">
        <p class="auth-sub">Create your free account to get started.</p>
        <form method="post" action="/signup" id="signup-form">
          <div class="form-group">
            <label class="form-label">FULL NAME</label>
            <input class="form-control" type="text" name="name" placeholder="e.g. Rahul Sharma" required/>
          </div>
          <div class="form-group">
            <label class="form-label">EMAIL ADDRESS</label>
            <input class="form-control" type="email" name="email" placeholder="you@example.com" required/>
          </div>
          <div class="form-group">
            <label class="form-label">MOBILE NUMBER</label>
            <div class="phone-group">
              <span class="phone-prefix">🇮🇳 +91</span>
              <input class="form-control" type="tel" name="phone" placeholder="10-digit mobile"
                     maxlength="10" pattern="[0-9]{10}" required style="flex:1;"/>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">PASSWORD</label>
            <div class="input-group">
              <input class="form-control" type="password" name="password" id="pw-signup"
                     placeholder="Min. 6 characters" required oninput="checkStrength(this.value)"/>
              <button type="button" class="input-group-btn" onclick="togglePw('pw-signup',this)">👁️</button>
            </div>
            <div class="pw-strength" id="pw-strength">
              <span class="pw-chip off" id="chip-len">6+ chars</span>
              <span class="pw-chip off" id="chip-upper">Uppercase</span>
              <span class="pw-chip off" id="chip-num">Number</span>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">CONFIRM PASSWORD</label>
            <div class="input-group">
              <input class="form-control" type="password" name="confirmPassword" id="pw-confirm"
                     placeholder="Re-enter password" required oninput="checkMatch()"/>
              <button type="button" class="input-group-btn" onclick="togglePw('pw-confirm',this)">👁️</button>
            </div>
            <div class="pass-match" id="pass-match"></div>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;padding:13px;font-size:14px;margin-top:6px;">
            ✨ Create My Account
          </button>
        </form>
        <div class="auth-switch">Already have an account? <a href="/login">Sign In →</a></div>
      </div>
    </div><!-- /auth-card -->

    <div class="auth-features">
      <span class="auth-feature-pill">✏ Manual Entry</span>
      <span class="auth-feature-pill">🏦 Bank Accounts</span>
      <span class="auth-feature-pill">🔁 Recurring</span>
      <span class="auth-feature-pill">📋 History</span>
    </div>
  </div>
</div>

<script>
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁️'; }
}
function checkStrength(val) {
  document.getElementById('chip-len').className  = 'pw-chip ' + (val.length >= 6 ? 'on' : 'off');
  document.getElementById('chip-upper').className= 'pw-chip ' + (/[A-Z]/.test(val) ? 'on' : 'off');
  document.getElementById('chip-num').className  = 'pw-chip ' + (/\d/.test(val) ? 'on' : 'off');
}
function checkMatch() {
  const p = document.getElementById('pw-signup').value;
  const c = document.getElementById('pw-confirm').value;
  const el = document.getElementById('pass-match');
  if (!c) { el.textContent = ''; return; }
  el.textContent = p === c ? '✓ Passwords match' : '✗ Passwords don\'t match';
  el.style.color = p === c ? '#4ade80' : '#f87171';
}
</script>
</body>
</html>
